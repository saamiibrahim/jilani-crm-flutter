<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="min-h-screen pb-32">
<!-- Top AppBar (from JSON) -->
<header class="bg-[#1A1A1A] dark:bg-[#1A1A1A] text-[#E8BA6A] font-manrope font-bold tracking-tight text-lg docked full-width top-0 border-b border-[#FFFFFF]/[0.05] flex justify-between items-center px-5 h-16 w-full z-50 fixed">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined cursor-pointer hover:bg-[#262626] p-2 rounded transition-colors" data-icon="close">close</span>
<h1 class="text-[#E8BA6A] font-extrabold tracking-widest uppercase text-sm">Add New Lead</h1>
</div>
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-[#262626] border border-[#E8BA6A]/20 flex items-center justify-center overflow-hidden">
<img alt="Agent Profile Picture" class="w-full h-full object-cover" data-alt="Professional headshot of a luxury real estate agent in a dark suit with a confident expression and soft studio lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAV0qgEiVBL1elxGjLWYCQSsOFjCtAgk6D05IbjnkhJzMRLl5Z_kcDDeVliMNBAxISJq-osF0PbSX1QcEXHqr4mafG3jedapxODPqnf0k3DQdypa4VfX5ZVegQ_ykTbx427ooHh-TNb4zrHqxsCvZHkXwa7oIofuhQGv3RYu40aGIlPktWkvQL7qvJlwrFFmL9jiGQJxna2V2jzHjCGLTYpW1l39XcS8FFUaD4FRzs8z8DY7OGx8kBOBAcf2pj5KQ2P5CEeYz01xw"/>
</div>
</div>
</header>
<main class="pt-24 px-margin-mobile max-w-lg mx-auto">
<!-- Brand Narrative Header -->
<div class="mb-xl text-center">
<h2 class="font-headline-xl text-headline-xl text-on-background mb-base">Capture Excellence</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant">Onboard your next premium client with precision.</p>
</div>
<!-- Form Section -->
<section class="space-y-lg">
<!-- Input: Name -->
<div class="group">
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs transition-colors group-focus-within:text-primary-container" for="name">Full Name</label>
<div class="relative">
<input class="w-full bg-[#262626] border-0 border-b border-[#FFFFFF]/20 text-on-surface font-body-md py-3 px-0 focus:ring-0 focus:border-primary-container transition-all placeholder:text-[#FFFFFF]/30" id="name" placeholder="Enter client's legal name" type="text"/>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
<!-- Input: Phone -->
<div class="group">
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs group-focus-within:text-primary-container" for="phone">Phone Number</label>
<input class="w-full bg-[#262626] border-0 border-b border-[#FFFFFF]/20 text-on-surface font-body-md py-3 px-0 focus:ring-0 focus:border-primary-container transition-all placeholder:text-[#FFFFFF]/30" id="phone" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
<!-- Input: Email -->
<div class="group">
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs group-focus-within:text-primary-container" for="email">Email Address</label>
<input class="w-full bg-[#262626] border-0 border-b border-[#FFFFFF]/20 text-on-surface font-body-md py-3 px-0 focus:ring-0 focus:border-primary-container transition-all placeholder:text-[#FFFFFF]/30" id="email" placeholder="client@example.com" type="email"/>
</div>
</div>
<!-- Input: Property of Interest -->
<div class="group">
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs group-focus-within:text-primary-container" for="property">Property of Interest</label>
<div class="relative flex items-center">
<input class="w-full bg-[#262626] border-0 border-b border-[#FFFFFF]/20 text-on-surface font-body-md py-3 px-0 pr-10 focus:ring-0 focus:border-primary-container transition-all placeholder:text-[#FFFFFF]/30" id="property" placeholder="e.g. The Penthouse at Azure" type="text"/>
<span class="material-symbols-outlined absolute right-0 text-on-surface-variant" data-icon="domain">domain</span>
</div>
</div>
<!-- Custom Dropdowns (Lead Source & Status) -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
<div class="group">
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs group-focus-within:text-primary-container" for="source">Lead Source</label>
<select class="w-full bg-[#262626] border-0 border-b border-[#FFFFFF]/20 text-on-surface font-body-md py-3 px-0 focus:ring-0 focus:border-primary-container transition-all appearance-none cursor-pointer" id="source">
<option value="referral">Referral</option>
<option value="website">Direct Website</option>
<option value="social">Social Media</option>
<option value="campaign">Marketing Campaign</option>
<option value="partner">Broker Partner</option>
</select>
</div>
<div class="group">
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs group-focus-within:text-primary-container" for="status">Initial Status</label>
<select class="w-full bg-[#262626] border-0 border-b border-[#FFFFFF]/20 text-on-surface font-body-md py-3 px-0 focus:ring-0 focus:border-primary-container transition-all appearance-none cursor-pointer" id="status">
<option value="new">New Lead</option>
<option value="contacted">Attempted Contact</option>
<option value="qualified">Qualified prospect</option>
<option value="meeting">Meeting Scheduled</option>
</select>
</div>
</div>
<!-- Visual Lead Card Preview (Asymmetric Layout element) -->
<div class="pt-xl">
<p class="font-label-sm text-label-sm text-[#E8BA6A] uppercase tracking-widest mb-md">Quick Summary Preview</p>
<div class="bg-[#262626] p-md rounded luxury-border flex items-start gap-4">
<div class="w-12 h-12 bg-[#1A1A1A] flex items-center justify-center rounded">
<span class="material-symbols-outlined text-primary-container" data-icon="person_add">person_add</span>
</div>
<div>
<p class="font-headline-md text-on-surface" id="preview-name">Untitled Prospect</p>
<p class="font-body-sm text-on-surface-variant flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-primary-container"></span>
                            Priority Status: Premium
                        </p>
</div>
</div>
</div>
</section>
<!-- Primary Action Button -->
<div class="fixed bottom-0 left-0 w-full p-margin-mobile bg-gradient-to-t from-[#1A1A1A] via-[#1A1A1A] to-transparent z-40">
<div class="max-w-lg mx-auto">
<button class="w-full bg-[#E8BA6A] text-[#1A1A1A] font-manrope font-bold py-4 rounded-xl custom-glow active:scale-95 transition-transform flex items-center justify-center gap-2 uppercase tracking-widest text-sm">
                    Create Lead
                    <span class="material-symbols-outlined text-xl" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</div>
</main>
<!-- Navigation suppressed for Transactional screen per "Destination Rule" -->
<!-- Footer Decorative Element -->
<div class="mt-xl px-margin-mobile opacity-20 text-center pointer-events-none">
<p class="font-label-sm tracking-[0.2em] text-on-surface-variant">JILLANI PROPERTIES CRM v1.0.4</p>
</div>
</body></html>
