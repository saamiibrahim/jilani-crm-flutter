<body class="bg-surface text-on-surface font-body-md antialiased min-h-screen pb-24">

<header class="bg-neutral-900 dark:bg-neutral-900 border-b border-white/5 flex justify-between items-center w-full px-5 py-3 sticky top-0 z-50">
<div class="flex items-center gap-4">
<button class="text-white/70 hover:bg-white/5 transition-colors p-1 rounded-full">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-yellow-500 dark:text-yellow-400 font-manrope font-semibold tracking-tight text-lg">Lead Status</h1>
</div>
<div class="flex items-center">
<button class="text-white/70 hover:bg-white/5 transition-colors p-1 rounded-full">
<span class="material-symbols-outlined" data-icon="more_vert">more_vert</span>
</button>
</div>
</header>
<main class="px-margin-mobile pt-lg max-w-2xl mx-auto">
<!-- Lead Context Section -->
<section class="mb-xl bg-surface-container p-lg rounded-xl border border-white/5 relative overflow-hidden">
<div class="absolute top-0 right-0 p-4 opacity-10">
<span class="material-symbols-outlined text-6xl" data-icon="person">person</span>
</div>
<div class="relative z-10">
<p class="text-label-md text-primary tracking-widest uppercase mb-base">Active Prospect</p>
<h2 class="font-headline-lg text-on-surface mb-base">Alexander Sterling</h2>
<div class="flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-primary-container"></span>
<span class="text-label-lg text-on-surface-variant">Current Status: Contacted</span>
</div>
</div>
</section>
<!-- Status Selection Section -->
<section class="space-y-sm">
<h3 class="text-label-lg text-primary-container mb-md flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]" data-icon="update">update</span>
                Select New Status
            </h3>
<div class="grid gap-sm">
<!-- Status Item -->
<label class="group relative block cursor-pointer">
<input class="peer sr-only" name="status" type="radio"/>
<div class="bg-surface-container border border-white/10 p-md rounded-lg transition-all peer-checked:status-card-active peer-checked:border-primary-container group-hover:bg-surface-container-high">
<div class="flex justify-between items-start">
<div>
<p class="font-headline-md text-on-surface text-md mb-xs">New Lead</p>
<p class="text-body-sm text-on-surface-variant">Initial inquiry received, awaiting first contact attempt.</p>
</div>
<div class="h-5 w-5 rounded-full border-2 border-outline-variant flex items-center justify-center peer-checked:border-primary-container group-hover:border-primary">
<div class="h-2.5 w-2.5 rounded-full bg-primary-container scale-0 peer-checked:scale-100 transition-transform"></div>
</div>
</div>
</div>
</label>
<label class="group relative block cursor-pointer">

<div>

</div>
<div class="h-5 w-5 rounded-full border-2 border-outline-variant flex items-center justify-center">
<div class="h-2.5 w-2.5 rounded-full bg-primary-container scale-0 transition-transform"></div>
</div>
</div>
</div>
</label>
<label class="group relative block cursor-pointer">

<div class="flex justify-between items-start">
<div>
<p class="font-headline-md text-primary text-md mb-xs">Contacted</p>

</div>
<div class="h-5 w-5 rounded-full border-2 border-primary-container flex items-center justify-center">

</div>
</div>

<div class="h-5 w-5 rounded-full border-2 border-outline-variant flex items-center justify-center">

</div>

</div>
